name: "Update All Flake Locks"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * 5' # Friday 15:00 UTC (Saturday 00:00 JST)

jobs:
  update-flake-locks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@bec50b45a8bb06017c42af46702a3f502adcfa9e # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: List templates
        id: list-templates
        uses: ./.github/actions/list-templates

      - name: Build flakes list
        id: list-flakes
        run: |
          {
            echo "flakes<<EOF"
            echo "./"
            echo '${{ steps.list-templates.outputs.templates }}' \
              | jq -r '.[] | select(. != "haskell") | "./templates/\(.)/"'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update flake.lock files
        id: update
        uses: gawakawa/update-flake-lock@multi-flake
        with:
          flakes: ${{ steps.list-flakes.outputs.flakes }}
          pr-title: "⬆️ Update all flake.lock files"
          pr-labels: dependencies
          branch: update-flake-lock/all
          token: ${{ steps.app-token.outputs.token }}

      - name: Enable auto-merge
        if: steps.update.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash ${{ steps.update.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
