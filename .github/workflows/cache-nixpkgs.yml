name: Cache nixpkgs

on:
  workflow_dispatch:
    inputs:
      package:
        description: "nixpkgs package name to build"
        required: true
        type: string
      platform:
        description: "Runner platform"
        required: true
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

jobs:
  build:
    runs-on: ${{ inputs.platform }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@bec50b45a8bb06017c42af46702a3f502adcfa9e # v31
        with:
          github_access_token: ${{ secrets.GH_TOKEN }}

      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: gawakawa
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: nix build "nixpkgs#${{ inputs.package }}" --inputs-from .
