name: "CI"

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      templates: ${{ steps.set-templates.outputs.templates }}
      haskell: ${{ steps.filter.outputs.haskell == 'true' || steps.filter.outputs.root == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GH_TOKEN }}

      - name: List all templates
        id: list-templates
        uses: ./.github/actions/list-templates

      - name: Generate filters
        run: |
          {
            echo "root:"
            echo "  - 'flake.nix'"
            echo "  - 'flake.lock'"
            echo '${{ steps.list-templates.outputs.templates }}' | jq -r '.[] | "\(.):\n  - \"templates/\(.)/**\""'
          } > filters.yml

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: filters.yml

      - name: Set templates to test
        id: set-templates
        run: |
          if [[ "${{ steps.filter.outputs.root }}" == "true" ]]; then
            printf 'templates=%s\n' '${{ steps.list-templates.outputs.templates }}' >> "$GITHUB_OUTPUT"
          else
            printf 'templates=%s\n' '${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"
          fi

  check-root-flake:
    uses: ./.github/workflows/check-root-flake.yml
    secrets: inherit

  test-templates:
    needs: detect-changes
    if: needs.detect-changes.outputs.templates != '[]'
    uses: ./.github/workflows/test-templates.yml
    with:
      templates: ${{ needs.detect-changes.outputs.templates }}
    secrets: inherit

  test-haskell-template:
    needs: detect-changes
    if: needs.detect-changes.outputs.haskell == 'true'
    uses: ./.github/workflows/test-haskell-template.yml
    secrets: inherit

  ci-success:
    needs: [check-root-flake, test-templates, test-haskell-template]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all checks passed
        run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
