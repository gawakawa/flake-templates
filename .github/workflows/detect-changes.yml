name: "detect-changes"

on:
  workflow_call:
    outputs:
      templates:
        value: ${{ jobs.detect-changes.outputs.templates }}
      root:
        value: ${{ jobs.detect-changes.outputs.root }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      templates: ${{ steps.set-templates.outputs.templates }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: cachix/install-nix-action@bec50b45a8bb06017c42af46702a3f502adcfa9e # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: List all templates
        id: list-templates
        uses: ./.github/actions/list-templates

      - name: Generate filters
        run: |
          {
            echo "root:"
            echo "  - 'flake.nix'"
            echo "  - 'flake.lock'"
            echo "  - 'flakes/**'"
            echo "$TEMPLATES" | jq -r '.[] | "\(.):\n  - \"templates/\(.)/**\""'
          } > filters.yml
        env:
          TEMPLATES: ${{ steps.list-templates.outputs.templates }}

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: filters.yml

      - name: Set templates to test
        id: set-templates
        run: |
          if [[ "$FILTER_ROOT" == "true" ]]; then
            printf 'templates=%s\n' "$TEMPLATES" >> "$GITHUB_OUTPUT"
          else
            printf 'templates=%s\n' "$FILTER_CHANGES" >> "$GITHUB_OUTPUT"
          fi
        env:
          FILTER_ROOT: ${{ steps.filter.outputs.root }}
          TEMPLATES: ${{ steps.list-templates.outputs.templates }}
          FILTER_CHANGES: ${{ steps.filter.outputs.changes }}
