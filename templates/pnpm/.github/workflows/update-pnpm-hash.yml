name: "Update pnpm deps hash"

on:
  pull_request:
    paths:
      - "pnpm-lock.yaml"

permissions:
  contents: write

jobs:
  update-hash:
    name: Update fetchPnpmDeps hash
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GH_TOKEN }}

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: gawakawa
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update pnpm deps hash
        run: |
          PLACEHOLDER="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"$PLACEHOLDER\"|" flakes/checks.nix

          HASH=$(nix flake check 2>&1 | grep 'got:' | awk '{print $2}')

          if [ -z "$HASH" ]; then
            echo "Failed to extract hash"
            exit 1
          fi

          echo "New hash: $HASH"
          sed -i "s|hash = \"$PLACEHOLDER\"|hash = \"$HASH\"|" flakes/checks.nix

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet flakes/checks.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flakes/checks.nix
          git commit -m "🔒 Update fetchPnpmDeps hash"
          git push
