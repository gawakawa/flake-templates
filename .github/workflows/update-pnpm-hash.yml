name: "Update pnpm deps hash"

on:
  pull_request:
    paths:
      - "templates/pnpm/pnpm-lock.yaml"

permissions:
  contents: write

jobs:
  update-hash:
    name: Update fetchPnpmDeps hash
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Nix
        uses: cachix/install-nix-action@bec50b45a8bb06017c42af46702a3f502adcfa9e # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: gawakawa
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update pnpm deps hash
        working-directory: templates/pnpm
        run: |
          echo "=== Current hash line ==="
          grep 'hash = ' flakes/checks.nix

          echo "=== Building fetchPnpmDeps to get correct hash ==="
          NIX_OUTPUT=$(nix build --no-link --impure --expr '
            let
              pkgs = (builtins.getFlake (toString ./.)).inputs.nixpkgs.legacyPackages.x86_64-linux;
            in
            pkgs.fetchPnpmDeps {
              pname = "pnpm-project-deps";
              version = "1.0.0";
              src = ./.;
              pnpm = pkgs.pnpm_10;
              fetcherVersion = 3;
              hash = "";
            }
          ' 2>&1) || true
          echo "$NIX_OUTPUT"

          echo "=== Extracting hash ==="
          HASH=$(echo "$NIX_OUTPUT" | grep 'got:' | awk '{print $2}')

          if [ -z "$HASH" ]; then
            echo "Failed to extract hash from nix output"
            echo "=== Full nix output for debugging ==="
            echo "$NIX_OUTPUT"
            exit 1
          fi

          echo "New hash: $HASH"
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"$HASH\"|" flakes/checks.nix

          echo "=== Final hash line ==="
          grep 'hash = ' flakes/checks.nix

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet templates/pnpm/flakes/checks.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add templates/pnpm/flakes/checks.nix
          git commit -m "🔒 Update fetchPnpmDeps hash"
          git push
